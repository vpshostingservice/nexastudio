<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="display:none">
  <div id="login-watermark"></div>
  <div id="login-box">
    <div class="logo">Cocofany</div>
    <p>Acceso privado — introduce tus credenciales</p>
    <input type="text" id="login-user" placeholder="Usuario" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password">
    <button onclick="checkLogin()">Entrar</button>
    <div id="login-error">Usuario o contraseña incorrectos ❌</div>
    <a href="https://ag-syndicate.com/" target="_blank" class="ag-block" style="text-decoration:none;display:block;">
      <div class="ag-block-top">
        <span class="ag-logo-text">AG<span class="ag-green">_</span>SYNDICATE</span>
        <span class="ag-status"><span class="ag-dot"></span>ONLINE</span>
      </div>
      <div class="ag-tagline">// Infraestructura &amp; Automatización</div>
    </a>
  </div>
</div>
